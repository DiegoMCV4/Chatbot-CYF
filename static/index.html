<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chatbot interactivo de Contabilidad y Finanzas basado en tu material de estudio.">
    <title>ChatBot de Diego Martín - Contabilidad y Finanzas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="header-info">
                <div class="bot-avatar">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/33/Escudo_unach.png" alt="UNACH Logo" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div>
                    <h1>ChatBot de Diego Martín Cruz Vázquez</h1>
                    <span class="status">Contabilidad y Finanzas</span>
                </div>
            </div>
            <button id="clear-btn" class="header-btn" title="Limpiar Chat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            </button>
        </header>

        <main class="chat-box" id="chat-box">
        </main>

        <!-- Barra de sugerencias -->
        <div class="suggestions-container" id="suggestions-container">
            <button class="suggestion-btn">¿A qué se refiere el postulado de entidad económica?</button>
            <button class="suggestion-btn">¿Cuáles son los usuarios internos?</button>
            <button class="suggestion-btn">Concepto de contabilidad financiera</button>
        </div>

        <footer class="chat-input-area">
            <input type="text" id="user-input" placeholder="Escribe tu pregunta aquí..." autocomplete="off">
            <button id="send-btn" title="Enviar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </footer>
    </div>

    <!-- Librería para renderizar Markdown (negritas, listas, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
