<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chatbot interactivo de Contabilidad y Finanzas basado en tu material de estudio.">
    <title>ChatBot de Finanzas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-info">
                <div class="bot-avatar">🤖</div>
                <div>
                    <h1>Asistente Financiero</h1>
                    <span class="status">En línea</span>
                </div>
            </div>
        </header>

        <main class="chat-box" id="chat-box">
            <div class="message bot-message">
                <div class="message-content">
                    ¡Hola! Soy tu asistente de Contabilidad y Finanzas. Hazme una pregunta sobre tu material de estudio.
                </div>
            </div>
        </main>

        <footer class="chat-input-area">
            <input type="text" id="user-input" placeholder="Escribe tu pregunta aquí..." autocomplete="off">
            <button id="send-btn" title="Enviar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </footer>
    </div>

    <!-- Librería para renderizar Markdown (negritas, listas, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
